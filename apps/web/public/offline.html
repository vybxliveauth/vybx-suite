<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sin conexión · Vybx</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --purple: #7c3aed; --pink: #ff2a5f; --bg: #090913; --text: #f1f5f9; --muted: #64748b; }
    body {
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      padding: 1.5rem;
    }
    .card {
      max-width: 420px;
      width: 100%;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.25rem;
    }
    .logo {
      width: 72px;
      height: 72px;
      border-radius: 18px;
      background: linear-gradient(135deg, #7c3aed, #ff2a5f);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      font-weight: 900;
      color: #fff;
      letter-spacing: -0.04em;
    }
    h1 { font-size: 1.5rem; font-weight: 800; letter-spacing: -0.03em; }
    p { font-size: 0.9rem; color: var(--muted); line-height: 1.6; }
    .icon {
      font-size: 3rem;
      filter: grayscale(1) opacity(0.4);
    }
    button {
      margin-top: 0.5rem;
      padding: 0.75rem 2rem;
      border-radius: 999px;
      border: none;
      background: linear-gradient(90deg, var(--purple), var(--pink));
      color: #fff;
      font-size: 0.92rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    button:hover { opacity: 0.88; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">V</div>
    <div class="icon">📡</div>
    <h1>Sin conexión</h1>
    <p>Parece que no tienes internet en este momento.<br>Verifica tu conexión y vuelve a intentarlo.</p>
    <button onclick="window.location.reload()">Reintentar</button>
  </div>
</body>
</html>
