name: Expo Mobile Build

on:
  workflow_dispatch:
    inputs:
      platform:
        description: "Build platform"
        required: true
        default: "ios"
        type: choice
        options:
          - ios
          - android
          - all
      profile:
        description: "EAS build profile"
        required: true
        default: "production"
        type: choice
        options:
          - development
          - preview
          - production

jobs:
  eas_build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      EXPO_PUBLIC_API_URL: "https://api.vybxlive.com/api/v1"
      EXPO_PUBLIC_ACCOUNT_APP_URL: "https://account.vybxlive.com"
    defaults:
      run:
        working-directory: apps/mobile

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Expo and EAS
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Trigger EAS build
        env:
          CI: "1"
        run: eas build --platform "${{ github.event.inputs.platform }}" --profile "${{ github.event.inputs.profile }}" --non-interactive
